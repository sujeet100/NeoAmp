name: Scorecard supply-chain security

# OpenSSF Scorecard: scores the repo's security practices (branch protection, pinned
# deps, CI tests, signed releases, …), uploads results to the Security tab, and (for
# public repos) publishes them so the README badge resolves.
on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  push:
    branches: [main]
  workflow_dispatch: # allow running on demand from the Actions tab

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to the Security tab
      id-token: write # publish results to the public OpenSSF API (for the badge)
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
