<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeoAmp Visualizer</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #c { position: fixed; top: 0; left: 0; display: block; width: 100%; height: 100%; }

    /* Compact preset strip pinned to the bottom of the canvas; auto-hides. The
       window chrome (titlebar, close, resize) is provided by the parent page. */
    #bar {
      position: fixed; left: 8px; right: 8px; bottom: 8px;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 7px;
      background: linear-gradient(180deg, rgba(20,20,28,.88), rgba(8,8,12,.88));
      border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
      font: 11px/1 "Lucida Console", monospace; color: #cfe0ff;
      transition: opacity .3s ease; user-select: none;
    }
    #bar.hidden { opacity: 0; pointer-events: none; }
    .fav-select {
      flex: 1 1 auto; min-width: 0; font: 600 11px/1 "Lucida Console", monospace;
      color: #06101a; background: #cfe0ff; border: 1px solid #2a4a68;
      border-radius: 3px; padding: 4px 6px; cursor: pointer;
      text-overflow: ellipsis; appearance: none; -webkit-appearance: none;
    }
    .fav-select optgroup { font-weight: 700; }
    .btn {
      flex: 0 0 auto; font-size: 12px; line-height: 1; color: #cfe0ff;
      background: #1b2433; border: 1px solid #3a4a60; border-radius: 3px;
      padding: 4px 7px; cursor: pointer;
    }
    .btn:hover { background: #26344a; }
    #star.on { color: #ffe27a; border-color: #c9a23a; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="bar">
    <select class="fav-select" id="presetSel" title="Pick a visualization"></select>
    <button class="btn" id="star" title="Favorite (F)">☆</button>
    <button class="btn" id="prev" title="Previous (←)">◄</button>
    <button class="btn" id="rand" title="Random (R)">🎲</button>
    <button class="btn" id="next" title="Next (→)">►</button>
  </div>

  <script src="vendor/butterchurn.min.js"></script>
  <script src="vendor/butterchurnPresets.min.js"></script>
  <script src="vendor/butterchurnPresetsExtra.min.js"></script>
  <script src="vendor/butterchurnPresetsExtra2.min.js"></script>
  <script src="wmp-presets.js"></script>
  <script src="viz.js"></script>
</body>
</html>
