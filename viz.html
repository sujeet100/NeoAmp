<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WMP Visualizer</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #c { position: fixed; top: 0; left: 0; display: block; width: 100%; height: 100%; }

    #bar {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 14px;
      max-width: 94vw; flex-wrap: wrap; justify-content: center;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(28,40,56,.92), rgba(10,16,24,.92));
      border: 1px solid #3c5a78; border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.1);
      font: 12px/1 "Tahoma", "Segoe UI", system-ui, sans-serif; color: #cfe9ff;
      transition: opacity .4s ease; user-select: none;
    }
    #bar.hidden { opacity: 0; pointer-events: none; }
    #name {
      min-width: 180px; max-width: 36vw; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: #8becc4; font-weight: 600; letter-spacing: .02em;
    }
    .favs { display: flex; gap: 6px; flex-wrap: wrap; }
    .fav {
      font: 600 11px/1 "Tahoma", system-ui, sans-serif; color: #07131d;
      background: linear-gradient(180deg, #9be8c6, #4fb78c);
      border: 1px solid #2f8463; border-radius: 5px; padding: 6px 9px; cursor: pointer;
    }
    .fav:hover { filter: brightness(1.12); }
    .fav:active { transform: translateY(1px); }
    .ctrls { display: flex; gap: 6px; }
    .btn {
      font-size: 13px; line-height: 1; color: #d6ffe6; background: #1b2b3d;
      border: 1px solid #3c5a78; border-radius: 5px; padding: 6px 9px; cursor: pointer;
    }
    .btn:hover { background: #25405a; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="bar">
    <span id="name">♪ loading…</span>
    <span class="favs" id="favs"></span>
    <span class="ctrls">
      <button class="btn" id="prev" title="Previous preset (←)">⏮</button>
      <button class="btn" id="rand" title="Random preset (R)">🎲</button>
      <button class="btn" id="next" title="Next preset (→ / Space)">⏭</button>
      <button class="btn" id="close" title="Close (Esc)">✕</button>
    </span>
  </div>

  <script src="vendor/butterchurn.min.js"></script>
  <script src="vendor/butterchurnPresets.min.js"></script>
  <script src="vendor/butterchurnPresetsExtra.min.js"></script>
  <script src="vendor/butterchurnPresetsExtra2.min.js"></script>
  <script src="wmp-presets.js"></script>
  <script src="viz.js"></script>
</body>
</html>
